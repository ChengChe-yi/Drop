[PickupSuppress]
; 拾取提示框白名单 — 在此列表中的物品即使 icon 匹配 UI_ItemIcon_112
; 也不会被拦截，会正常显示拾取提示框
; 每行一个物品名，精确匹配
; 示例：
; 史莱姆凝液
; 
